<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>ProofStack — Turn Happy Clients into Your Best Sales Tool</title>
    <meta name="title" content="ProofStack — Turn Happy Clients into Your Best Sales Tool" />
    <meta name="description" content="Collect, manage, and display stunning testimonials that convert visitors into customers. Share a link, get testimonials, embed a beautiful wall in minutes." />
    <meta name="keywords" content="testimonial software, social proof tool, client reviews, testimonial wall, embed testimonials, saas testimonials" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="author" content="ProofStack" />
    <link rel="canonical" href="https://proofstack.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://proofstack.app/" />
    <meta property="og:title" content="ProofStack — Turn Happy Clients into Your Best Sales Tool" />
    <meta property="og:description" content="Collect, manage, and display stunning testimonials that convert visitors into customers. Share a link, get testimonials, embed a beautiful wall in minutes." />
    <meta property="og:image" content="https://proofstack.app/og-image.svg" />
    <meta property="og:site_name" content="ProofStack" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://proofstack.app/" />
    <meta property="twitter:title" content="ProofStack — Turn Happy Clients into Your Best Sales Tool" />
    <meta property="twitter:description" content="Collect, manage, and display stunning testimonials that convert visitors into customers. Share a link, get testimonials, embed a beautiful wall in minutes." />
    <meta property="twitter:image" content="https://proofstack.app/og-image.svg" />
    <meta name="twitter:creator" content="@proofstackapp" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/og-image.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ProofStack",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Collect, manage, and display stunning testimonials that convert visitors into customers.",
      "url": "https://proofstack.app",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free Plan",
          "price": "0",
          "priceCurrency": "GBP"
        },
        {
          "@type": "Offer",
          "name": "Pro Plan",
          "price": "9",
          "priceCurrency": "GBP",
          "billingIncrement": "monthly"
        },
        {
          "@type": "Offer",
          "name": "Business Plan",
          "price": "19",
          "priceCurrency": "GBP",
          "billingIncrement": "monthly"
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "127"
      }
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ProofStack",
      "url": "https://proofstack.app",
      "logo": "https://proofstack.app/og-image.svg",
      "sameAs": [
        "https://twitter.com/proofstackapp"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@proofstack.app",
        "contactType": "customer support"
      }
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How do I collect testimonials with ProofStack?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Simply share your unique collection link with your clients. They fill in a simple form with their name, role, testimonial text, and star rating. You approve it and it appears on your wall."
          }
        },
        {
          "@type": "Question",
          "name": "Can I embed the testimonial wall on my website?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! You can embed your testimonial wall using a simple iframe snippet. Copy the embed code from your dashboard and paste it anywhere on your website."
          }
        },
        {
          "@type": "Question",
          "name": "What is the free plan limit?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The free plan allows you to collect and display up to 3 approved testimonials. Upgrade to Pro for unlimited testimonials."
          }
        },
        {
          "@type": "Question",
          "name": "Can I customise the look of my testimonial wall?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pro and Business plan users can fully customise the wall: choose grid, carousel, or masonry layouts, set custom colours, and choose from multiple font options."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a setup fee?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No setup fees ever. Start free and upgrade when you need more features. Cancel anytime."
          }
        },
        {
          "@type": "Question",
          "name": "Do testimonials appear automatically?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No — you review and approve all testimonials before they appear on your wall. This ensures only genuine, high-quality testimonials are displayed."
          }
        },
        {
          "@type": "Question",
          "name": "What happens if I cancel my subscription?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You keep access to Pro features until the end of your billing period. After that, your account reverts to the free plan and only your first 3 approved testimonials remain visible."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
