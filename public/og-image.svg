<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1000" cy="100" r="300" fill="#7c3aed" opacity="0.15"/>
  <circle cx="200" cy="550" r="200" fill="#4c1d95" opacity="0.3"/>

  <!-- Logo box -->
  <rect x="120" y="175" width="80" height="80" rx="20" fill="url(#accent)"/>
  <text x="160" y="228" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="white" text-anchor="middle">P</text>

  <!-- Brand name -->
  <text x="220" y="228" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="white">ProofStack</text>

  <!-- Headline -->
  <text x="120" y="310" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="900" fill="white">Turn Happy Clients into</text>
  <text x="120" y="380" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="900" fill="#c4b5fd">Your Best Sales Tool</text>

  <!-- Subheadline -->
  <text x="120" y="440" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="#a78bfa">Collect · Manage · Embed beautiful testimonials</text>

  <!-- Stars -->
  <text x="120" y="510" font-size="40" fill="#fbbf24">★★★★★</text>
  <text x="360" y="510" font-family="Inter, system-ui, sans-serif" font-size="26" fill="#c4b5fd">2,400+ testimonials collected</text>

  <!-- CTA badge -->
  <rect x="120" y="545" width="280" height="50" rx="25" fill="#7c3aed"/>
  <text x="260" y="576" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="white" text-anchor="middle">Start free today</text>
</svg>
